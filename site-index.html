<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CameraPick</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f1ea;
      --card: rgba(255,255,255,0.86);
      --text: #1f1d1a;
      --muted: #5f5a53;
      --accent: #6e5cff;
      --border: rgba(31,29,26,0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161410;
        --card: rgba(30,27,22,0.92);
        --text: #f5efe7;
        --muted: #c0b5a7;
        --accent: #9e91ff;
        --border: rgba(255,255,255,0.1);
      }
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,92,255,0.18), transparent 36%),
        linear-gradient(180deg, var(--bg), #e8e1d5 100%);
      color: var(--text);
      line-height: 1.65;
    }
    main {
      max-width: 840px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.08);
      backdrop-filter: blur(14px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3vw, 3.2rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(110,92,255,0.08);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="eyebrow">CameraPick</div>
      <h1>Camera and lens discovery, comparison, and pricing views.</h1>
      <p>CameraPick helps users browse camera and lens models, compare specs, review regional pricing, manage favorites, and control privacy choices.</p>
      <div class="links">
        <a href="./privacy/">Privacy Policy</a>
        <a href="./support/">Support</a>
        <a href="./app-ads.txt">app-ads.txt</a>
      </div>
    </section>
  </main>
</body>
</html>
